<!DOCTYPE html>
<html lang="ko" data-theme="hitagi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ASCEND">
<meta name="theme-color" content="#070710">
<link rel="apple-touch-icon" href="icon.png?v=2">
<title>ASCEND</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ============ THEME TOKENS (glassmorphism) ============
   --b1/--b2/--b3 = 배경 글로우 블롭 색 (3개)
   --glass = 유리 표면 / --glass2 = 강조 유리 / --stroke = 유리 테두리
   --accent / --accent2 = 포인트 그라데이션 */
:root, [data-theme="aurora"]{
  --bg:#070710;--b1:#c6f135;--b2:#22d3ee;--b3:#a855f7;
  --ink:#f4f6fb;--sub:#a6abc0;--dim:#5b6076;
  --glass:rgba(255,255,255,.055);--glass2:rgba(255,255,255,.1);--stroke:rgba(255,255,255,.12);--stroke2:rgba(255,255,255,.2);
  --accent:#c6f135;--accent2:#22d3ee;--accent-ink:#06070d;
  --grad:linear-gradient(135deg,#c6f135,#22d3ee);
  --card-solid:#15151d;--chip-solid:#1d1d28;
  --skill:#5e9bff;--power:#ff6b6b;--hyper:#3ddb8f;--acc:#c084fc;--core:#ffb13d;
}
[data-theme="sunset"]{--bg:#0e0608;--b1:#ff2d55;--b2:#ff7a18;--b3:#ffc043;--ink:#fbeef0;--sub:#c39aa0;--dim:#7a545c;--glass:rgba(255,255,255,.05);--glass2:rgba(255,255,255,.1);--stroke:rgba(255,180,160,.14);--stroke2:rgba(255,180,160,.24);--accent:#ff2d55;--accent2:#ff9d2f;--accent-ink:#fff;--grad:linear-gradient(135deg,#ff2d55,#ff9d2f);--skill:#5e9bff;--power:#ff6b6b;--hyper:#3ddb8f;--acc:#c084fc;--core:#ffb13d--card-solid:#1a1012;--chip-solid:#241619;}
[data-theme="abyss"]{--bg:#040810;--b1:#00e5ff;--b2:#3b82f6;--b3:#7c5cff;--ink:#e9f4ff;--sub:#90a8c8;--dim:#4f6688;--glass:rgba(255,255,255,.05);--glass2:rgba(255,255,255,.1);--stroke:rgba(150,200,255,.14);--stroke2:rgba(150,200,255,.26);--accent:#00e5ff;--accent2:#7c5cff;--accent-ink:#02101a;--grad:linear-gradient(135deg,#00e5ff,#7c5cff);--skill:#5e9bff;--power:#ff6b6b;--hyper:#3ddb8f;--acc:#c084fc;--core:#ffb13d--card-solid:#0d121c;--chip-solid:#141b29;}
[data-theme="orchid"]{--bg:#0b0712;--b1:#c061ff;--b2:#ff61dc;--b3:#7c5cff;--ink:#f3ecfa;--sub:#ad96c6;--dim:#6a5288;--glass:rgba(255,255,255,.055);--glass2:rgba(255,255,255,.11);--stroke:rgba(220,180,255,.14);--stroke2:rgba(220,180,255,.26);--accent:#c061ff;--accent2:#ff61dc;--accent-ink:#120618;--grad:linear-gradient(135deg,#c061ff,#ff61dc);--skill:#5e9bff;--power:#ff6b6b;--hyper:#3ddb8f;--acc:#c084fc;--core:#ffb13d--card-solid:#16101f;--chip-solid:#1f1730;}
[data-theme="jade"]{--bg:#04100b;--b1:#2bf58a;--b2:#a3e635;--b3:#22d3ee;--ink:#e9f7ef;--sub:#88b09c;--dim:#4e7060;--glass:rgba(255,255,255,.05);--glass2:rgba(255,255,255,.1);--stroke:rgba(160,255,210,.14);--stroke2:rgba(160,255,210,.26);--accent:#2bf58a;--accent2:#a3e635;--accent-ink:#04180e;--grad:linear-gradient(135deg,#2bf58a,#a3e635);--skill:#5e9bff;--power:#ff6b6b;--hyper:#3ddb8f;--acc:#c084fc;--core:#ffb13d--card-solid:#0c1812;--chip-solid:#11231b;}
[data-theme="sakura"]{--bg:#0f0a0d;--b1:#ff7eb6;--b2:#c061ff;--b3:#ff9d5c;--ink:#fbecf2;--sub:#c498aa;--dim:#7e5c6c;--glass:rgba(255,255,255,.06);--glass2:rgba(255,255,255,.12);--stroke:rgba(255,190,220,.16);--stroke2:rgba(255,190,220,.28);--accent:#ff7eb6;--accent2:#c061ff;--accent-ink:#1a0810;--grad:linear-gradient(135deg,#ff7eb6,#c061ff);--skill:#5e9bff;--power:#ff6b6b;--hyper:#3ddb8f;--acc:#c084fc;--core:#ffb13d--card-solid:#1a1218;--chip-solid:#241a22;}
[data-theme="mono"]{--bg:#0b0b0d;--b1:#ffffff;--b2:#9ca3af;--b3:#6b7280;--ink:#f4f5f7;--sub:#9aa0ac;--dim:#585d68;--glass:rgba(255,255,255,.06);--glass2:rgba(255,255,255,.12);--stroke:rgba(255,255,255,.14);--stroke2:rgba(255,255,255,.24);--accent:#ffffff;--accent2:#9ca3af;--accent-ink:#0b0b0d;--grad:linear-gradient(135deg,#ffffff,#9ca3af);--skill:#5e9bff;--power:#ff6b6b;--hyper:#3ddb8f;--acc:#c084fc;--core:#ffb13d--card-solid:#16161a;--chip-solid:#1f1f24;}
[data-theme="daylight"]{--bg:#eef1f7;--b1:#3b5bff;--b2:#7c3cff;--b3:#22d3ee;--ink:#0f1320;--sub:#5a6178;--dim:#9aa1b4;--glass:rgba(255,255,255,.6);--glass2:rgba(255,255,255,.8);--stroke:rgba(20,30,60,.1);--stroke2:rgba(20,30,60,.18);--accent:#3b5bff;--accent2:#7c3cff;--accent-ink:#fff;--grad:linear-gradient(135deg,#3b5bff,#7c3cff);--skill:#3b5bff;--power:#ff6b6b;--hyper:#1fbf72;--acc:#9333ea;--core:#e08a16--card-solid:#ffffff;--chip-solid:#eef1f7;}
[data-theme="hitagi"]{--bg:#0d0813;--b1:#a855f7;--b2:#7c3cff;--b3:#e0568f;--ink:#f3ecfa;--sub:#ad96c6;--dim:#6a5288;--glass:rgba(255,255,255,.055);--glass2:rgba(255,255,255,.1);--stroke:rgba(210,180,255,.14);--stroke2:rgba(210,180,255,.26);--accent:#b066ff;--accent2:#e0568f;--accent-ink:#120618;--grad:linear-gradient(135deg,#b066ff,#e0568f);--skill:#5e9bff;--power:#ff6b6b;--hyper:#3ddb8f;--acc:#c084fc;--core:#ffb13d;--char:url('theme-hitagi.jpg?v=4')--card-solid:#181020;--chip-solid:#22182e;}
[data-theme="tsubasa"]{--bg:#0f0708;--b1:#ff2d3f;--b2:#ff6b4a;--b3:#8a8f9c;--ink:#f7ecec;--sub:#bd9498;--dim:#7a5258;--glass:rgba(255,255,255,.05);--glass2:rgba(255,255,255,.1);--stroke:rgba(255,180,170,.14);--stroke2:rgba(255,180,170,.26);--accent:#ff2d3f;--accent2:#ff7a45;--accent-ink:#fff;--grad:linear-gradient(135deg,#ff2d3f,#ff7a45);--skill:#5e9bff;--power:#ff6b6b;--hyper:#3ddb8f;--acc:#c084fc;--core:#ffb13d;--char:url('theme-tsubasa.jpg?v=4')--card-solid:#1a1012;--chip-solid:#241619;}
[data-theme="nadeko"]{--bg:#0f0a07;--b1:#ff8a3d;--b2:#ff6f91;--b3:#ffc043;--ink:#f9efe6;--sub:#bd9c84;--dim:#7e604c;--glass:rgba(255,255,255,.055);--glass2:rgba(255,255,255,.11);--stroke:rgba(255,200,160,.14);--stroke2:rgba(255,200,160,.26);--accent:#ff8a3d;--accent2:#ff6f91;--accent-ink:#1a0d04;--grad:linear-gradient(135deg,#ff8a3d,#ff6f91);--skill:#5e9bff;--power:#ff6b6b;--hyper:#3ddb8f;--acc:#c084fc;--core:#ffb13d;--char:url('theme-nadeko.jpg?v=4')--card-solid:#1a120c;--chip-solid:#241a12;}
[data-theme="suruga"]{--bg:#070a14;--b1:#4f7cff;--b2:#7c5cff;--b3:#ff6f4a;--ink:#e9eeff;--sub:#94a0c6;--dim:#525e85;--glass:rgba(255,255,255,.05);--glass2:rgba(255,255,255,.1);--stroke:rgba(170,190,255,.14);--stroke2:rgba(170,190,255,.26);--accent:#5e8bff;--accent2:#9d6cff;--accent-ink:#060912;--grad:linear-gradient(135deg,#5e8bff,#9d6cff);--skill:#5e9bff;--power:#ff6b6b;--hyper:#3ddb8f;--acc:#c084fc;--core:#ffb13d;--char:url('theme-suruga.jpg?v=4')--card-solid:#101422;--chip-solid:#181d30;}
[data-theme="mayoi"]{--bg:#0a0c06;--b1:#ffcf3d;--b2:#9bd444;--b3:#ff9d3d;--ink:#f5f6e9;--sub:#a8ab8a;--dim:#646b4e;--glass:rgba(255,255,255,.055);--glass2:rgba(255,255,255,.11);--stroke:rgba(220,230,150,.14);--stroke2:rgba(220,230,150,.26);--accent:#f5c451;--accent2:#9bd444;--accent-ink:#161806;--grad:linear-gradient(135deg,#f5c451,#9bd444);--skill:#5e9bff;--power:#ff6b6b;--hyper:#3ddb8f;--acc:#c084fc;--core:#ffb13d;--char:url('theme-mayoi.jpg?v=4')--card-solid:#14160c;--chip-solid:#1d2012;}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ringGlow{0%,100%{filter:drop-shadow(0 0 6px var(--accent))}50%{filter:drop-shadow(0 0 18px var(--accent))}}
33%{transform:translate(12vw,8vh) scale(1.15)}66%{transform:translate(-8vw,14vh) scale(.9)}}
33%{transform:translate(-14vw,10vh) scale(.95)}66%{transform:translate(10vw,-6vh) scale(1.2)}}
50%{transform:translate(8vw,-12vh) scale(.85)}}

html,body{background:var(--bg)}
body{color:var(--ink);font-family:'Archivo','Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;position:relative}

/* ===== BACKGROUND GLOW BLOBS (글래스 뒤 빛) ===== */
.bg-blobs{position:fixed;inset:0;z-index:-2;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:.18;will-change:transform}
.blob.b1{width:58vw;height:58vw;background:var(--b1);top:-12vh;left:-18vw}
.blob.b2{width:52vw;height:52vw;background:var(--b2);top:18vh;right:-22vw}
.blob.b3{width:48vw;height:48vw;background:var(--b3);bottom:-18vh;left:8vw}

.char-bg{position:fixed;inset:0;z-index:-1;pointer-events:none;background-image:var(--char,none);background-size:cover;background-position:top center;opacity:.5;filter:saturate(1.05);-webkit-mask-image:linear-gradient(180deg,rgba(0,0,0,1) 0%,rgba(0,0,0,.85) 55%,rgba(0,0,0,.4) 82%,transparent 100%);mask-image:linear-gradient(180deg,rgba(0,0,0,1) 0%,rgba(0,0,0,.85) 55%,rgba(0,0,0,.4) 82%,transparent 100%);transition:opacity .4s}
.char-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,color-mix(in srgb,var(--bg) 55%,transparent) 0%,color-mix(in srgb,var(--bg) 38%,transparent) 42%,var(--bg) 100%)}
.char-veil{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:0;background:linear-gradient(180deg,rgba(0,0,0,.22) 0%,rgba(0,0,0,.12) 28%,rgba(0,0,0,.4) 70%,var(--bg) 100%);transition:opacity .4s}
body.has-char .char-veil{opacity:1}
.bg-grain{position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:.4;background:
  radial-gradient(140% 60% at 50% 0%,transparent 60%,var(--bg) 100%);}

.app{max-width:560px;margin:0 auto;position:relative;min-height:100vh;padding-bottom:calc(40px + env(safe-area-inset-bottom))}

/* glass helper */
.glass{background:var(--glass);backdrop-filter:blur(16px) saturate(135%);-webkit-backdrop-filter:blur(16px) saturate(135%);border:1px solid var(--stroke);box-shadow:0 8px 32px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.08)}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:calc(14px + env(safe-area-inset-top)) 20px 14px;background:linear-gradient(180deg,var(--bg),transparent);backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:26px;height:26px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-family:'Archivo Expanded';font-weight:900;font-size:14px;color:var(--accent-ink);box-shadow:0 4px 16px color-mix(in srgb,var(--accent) 50%,transparent)}
.logo-txt{font-family:'Archivo Expanded';font-weight:800;font-size:16px;letter-spacing:1.5px}
.burger{width:46px;height:46px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:.18s}
.burger:active{transform:scale(.9)}
.burger span{width:18px;height:2px;background:var(--ink);border-radius:2px}

/* ===== TODAY ===== */
.today{padding:8px 20px 0;animation:fadeUp .5s ease}
.today-date{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding:0 2px}
.td-l .dow{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1px;color:var(--accent);font-weight:700}
.td-l .full{font-size:12px;color:var(--dim);margin-top:3px}
.td-context{text-align:right}
.td-context .c{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:.5px}
.td-context .c b{color:var(--sub)}

/* hero glass card */
.todaycard{position:relative;border-radius:28px;overflow:hidden;margin-bottom:16px}
.tc-glasslayer{position:relative;border-radius:28px;padding:26px 24px;background:var(--glass2);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);border:1px solid var(--stroke2);box-shadow:0 20px 50px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.14);overflow:hidden}
.tc-sheen{position:absolute;top:-50%;left:-30%;width:80%;height:160%;background:linear-gradient(115deg,transparent,rgba(255,255,255,.13),transparent);transform:rotate(8deg);pointer-events:none}
.tc-eyebrow{position:relative;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--accent);font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.tc-eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2.4s infinite}
.tc-title{position:relative;font-family:'Archivo Expanded';font-weight:900;font-size:clamp(36px,12vw,50px);line-height:.88;letter-spacing:-1.5px;text-transform:uppercase}
.tc-title .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.tc-sub{position:relative;font-size:13px;color:var(--sub);margin-top:12px;max-width:280px;line-height:1.5}
.tc-meta{position:relative;display:flex;gap:10px;margin-top:20px}
.tcm{flex:1;background:var(--chip-solid);border:1px solid var(--stroke);border-radius:14px;padding:11px 12px}
.tcm .v{font-family:'Archivo Expanded';font-weight:800;font-size:18px}
.tcm .l{font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);margin-top:2px;font-weight:700}
.tc-bar{position:relative;height:10px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;margin-top:20px}
.tc-bar .f{height:100%;background:var(--grad);border-radius:6px;width:0;transition:width .5s cubic-bezier(.4,0,.2,1);position:relative;box-shadow:0 0 16px color-mix(in srgb,var(--accent) 60%,transparent)}
.tc-bar .f::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);background-size:200% 100%;animation:shimmer 2s infinite}
.tc-cta{position:relative;display:flex;align-items:center;justify-content:space-between;margin-top:18px}
.tc-prog-txt{font-family:'Space Mono',monospace;font-size:12px;color:var(--sub);font-weight:700}
.start-btn{background:var(--grad);color:var(--accent-ink);border:none;border-radius:15px;padding:15px 26px;font-family:'Archivo Expanded';font-weight:800;font-size:14px;letter-spacing:.5px;cursor:pointer;box-shadow:0 8px 24px color-mix(in srgb,var(--accent) 45%,transparent);transition:.16s}
.start-btn:active{transform:scale(.94)}

.quick{display:flex;gap:10px;margin-bottom:8px}
.qbtn{flex:1;border-radius:18px;padding:15px 10px;text-align:center;cursor:pointer;transition:transform .16s;background:var(--card-solid);border:1px solid var(--stroke)}
.qbtn:active{transform:scale(.95)}
.qbtn .qi{font-size:19px}
.qbtn .qt{font-size:11px;color:var(--sub);margin-top:5px;font-weight:600}

/* ===== SESSION ===== */
.sess{padding:6px 20px 0;animation:fadeUp .4s ease}
.sess.hidden,.subview.hidden,.today.hidden{display:none}
.sess-back,.sv-back{display:inline-flex;align-items:center;gap:7px;font-family:'Space Mono',monospace;font-size:12px;color:var(--sub);font-weight:700;cursor:pointer;padding:10px 14px;margin-bottom:8px;border-radius:12px;background:var(--glass);border:1px solid var(--stroke);backdrop-filter:blur(12px)}
.sess-back:active,.sv-back:active{transform:scale(.96)}
.sess-head{display:flex;align-items:flex-start;justify-content:space-between;padding:8px 4px 16px}
.sh-l .fc{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);font-weight:700}
.sh-l .ti{font-family:'Archivo Expanded';font-weight:900;font-size:26px;text-transform:uppercase;margin-top:6px;letter-spacing:-.5px;line-height:1}
.sh-l .su{font-size:12px;color:var(--sub);margin-top:8px;max-width:230px}
.sh-r{text-align:right;flex-shrink:0}
.sh-r .dur{font-family:'Archivo Expanded';font-weight:800;font-size:20px}
.sh-r .durl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);font-weight:700}
.psum{display:flex;align-items:center;gap:12px;padding:6px 4px 4px}
.psum-bar{flex:1;height:10px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden}
.psum-fill{height:100%;background:var(--grad);border-radius:6px;width:0;transition:width .45s cubic-bezier(.4,0,.2,1);box-shadow:0 0 14px color-mix(in srgb,var(--accent) 55%,transparent)}
.psum-txt{font-family:'Space Mono',monospace;font-size:11px;color:var(--sub);font-weight:700}
.reset-btn{font-family:'Space Mono',monospace;font-size:10px;color:var(--sub);background:var(--glass);border:1px solid var(--stroke);border-radius:10px;padding:7px 11px;cursor:pointer;font-weight:600;backdrop-filter:blur(8px)}
.reset-btn:active{transform:scale(.95)}
.wu{margin:16px 0;border-radius:18px;overflow:hidden;background:var(--card-solid);border:1px solid var(--stroke)}
.wu-h{display:flex;align-items:center;justify-content:space-between;padding:16px;cursor:pointer}
.wu-h .t{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--core);letter-spacing:.5px}
.wu-h .ic{font-size:18px;color:var(--core);transition:.3s;font-weight:300}
.wu.open .wu-h .ic{transform:rotate(135deg)}
.wu-b{max-height:0;overflow:hidden;transition:max-height .35s ease;padding:0 16px}
.wu.open .wu-b{max-height:520px;padding:2px 16px 16px}
.wu-r{display:flex;justify-content:space-between;padding:8px 0;font-size:12.5px;border-bottom:1px solid var(--stroke)}
.wu-r:last-child{border:none}
.wu-r .n{color:var(--sub)}.wu-r .v{font-family:'Space Mono',monospace;font-weight:700;color:var(--dim)}
.blocks{padding:6px 0 12px}
.blk{margin-top:24px}
.blk:first-child{margin-top:14px}
.blk-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.chip{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 11px;border-radius:9px;border:1px solid transparent}
.c-skill{background:color-mix(in srgb,var(--skill) 16%,transparent);color:var(--skill);border-color:color-mix(in srgb,var(--skill) 30%,transparent)}
.c-power{background:color-mix(in srgb,var(--power) 16%,transparent);color:var(--power);border-color:color-mix(in srgb,var(--power) 30%,transparent)}
.c-hyper{background:color-mix(in srgb,var(--hyper) 16%,transparent);color:var(--hyper);border-color:color-mix(in srgb,var(--hyper) 30%,transparent)}
.c-acc{background:color-mix(in srgb,var(--acc) 16%,transparent);color:var(--acc);border-color:color-mix(in srgb,var(--acc) 30%,transparent)}
.c-core{background:color-mix(in srgb,var(--core) 16%,transparent);color:var(--core);border-color:color-mix(in srgb,var(--core) 30%,transparent)}
.blk-d{font-size:11px;color:var(--sub)}

/* 사이클 보너스: reps 칩에 +repBonus, 가중 운동엔 중량 안내 */
function applyCycle(scheme){
  const b=CYCLES[cc].repBonus;
  if(b===0) return scheme;
  return scheme.split('·').map(t=>{
    const m=t.match(/^(\d+)(.*)$/);
    if(m){ // 숫자로 시작(reps/초)
      return (parseInt(m[1])+b)+m[2];
    }
    return t;
  }).join('·');
}

function buildBlocks(p,d){return M[p][d].blk;}
function totalSets(p,d){let t=0;buildBlocks(p,d).forEach(b=>b.e.forEach(ex=>t+=setCount(ex)));return t;}
function dayProgress(p,d){const t=totalSets(p,d);return t?getDone(p,d).length/t:0;}
function dayComplete(p,d){return totalSets(p,d)>0&&getDone(p,d).length>=totalSets(p,d);}

/* ---------- 오늘 자동 ---------- */
function todayKey(){
  const wd=new Date().getDay(); // 0=Sun..6=Sat
  const map={0:"sun",1:"mon",2:"tue",3:"wed",4:"thu",5:"fri",6:"sat"};
  return map[wd];
}
function fmtDate(){
  const d=new Date();
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

/* ---------- 사이클 보너스 ---------- (applyCycle는 데이터 블록에 이미 존재) */

/* ---------- 메뉴 ---------- */
function openMenu(){document.getElementById('navOv').classList.add('show');document.getElementById('navMenu').classList.add('show');renderMenu();}
function closeMenu(){document.getElementById('navOv').classList.remove('show');document.getElementById('navMenu').classList.remove('show');}
function renderMenu(){
  // days
  document.getElementById('menuDays').innerHTML=DOW_ORDER.map(k=>{
    const pr=Math.round(dayProgress(cp,k)*100);
    const lbl=DAYS.find(x=>x[0]===k);
    return `<div class="md${k===cd?' on':''}" onclick="pickDay('${k}')"><div class="dn">${lbl[1]}</div><div class="df">${lbl[2]}</div><div class="pd"><div class="f" style="width:${pr}%"></div></div></div>`;
  }).join('');
  // cycles
  document.getElementById('menuCycles').innerHTML=CYCLES.map((c,i)=>
    `<div class="ms${i===cc?' on':''}" onclick="pickCycle(${i})">${c.name.replace('CYCLE ','C')}<span class="sub">${c.sub}</span></div>`).join('');
  // weeks
  const wl=["적응","횟수↑","중량↑","난이도↑"];
  document.getElementById('menuWeeks').innerHTML=[0,1,2,3].map(i=>
    `<div class="ms${i===cp?' on':''}" onclick="pickWeek(${i})">W${i+1}<span class="sub">${wl[i]}</span></div>`).join('');
}
function pickDay(k){cd=k;view='session';showSession();closeMenu();}
function pickCycle(i){cc=i;renderMenu();if(view==='today')renderToday();if(view==='session')showSession();if(view==='prog')renderProg();toast(CYCLES[i].name+' 적용');}
function pickWeek(i){cp=i;renderMenu();if(view==='today')renderToday();if(view==='session')showSession();toast('WEEK '+(i+1)+' 적용');}

/* ---------- 뷰 전환 ---------- */
function showView(v){
  view=v;
  document.getElementById('todayView').classList.toggle('hidden',v!=='today');
  document.getElementById('sessView').classList.toggle('hidden',v!=='session');
  document.getElementById('dietView').classList.toggle('hidden',v!=='diet');
  document.getElementById('progView').classList.toggle('hidden',v!=='prog');
  ['today','diet','prog'].forEach(x=>{const mi=document.getElementById('nav-'+x);if(mi)mi.classList.toggle('on',x===v||(v==='session'&&x==='today'));});
}
function goTab(v){
  if(v==='today'){cd=todayKey()==='sun'?'mon':todayKey();renderToday();showView('today');}
  if(v==='diet'){renderDiet();showView('diet');}
  if(v==='prog'){renderProg();showView('prog');}
  closeMenu();
}
function backToToday(){renderToday();showView('today');}

/* ---------- 오늘 화면 ---------- */
function renderToday(){
  const tk=todayKey();
  const isRest=(tk==='sun');
  const dkey=isRest?'mon':tk;
  cd=dkey;
  document.getElementById('todayDow').textContent=isRest?'일요일 · 휴식일':DAY_KO[dkey];
  document.getElementById('todayFull').textContent=fmtDate();
  document.getElementById('todayCtx').innerHTML=`<b>${CYCLES[cc].name}</b> · WEEK ${cp+1}`;
  const card=document.getElementById('todayCard');
  if(isRest){
    card.innerHTML=`<div class="todaycard"><div class="tc-grad"></div><div class="tc-in"><div class="tc-eyebrow">REST DAY</div><div class="tc-title"><span class="grad">회복</span></div><div class="tc-sub">오늘은 일요일. 푹 쉬고 내일 다시. 회복도 훈련의 일부야.</div><div class="tc-cta"><span class="tc-prog-txt">다른 날 보려면 메뉴 ☰</span><button class="start-btn" onclick="openMenu()">메뉴 열기</button></div></div></div>`;
    document.getElementById('quickRow').innerHTML='';
    return;
  }
  const d=M[cp][dkey];
  const t=totalSets(cp,dkey),dc=getDone(cp,dkey).length,pct=t?Math.round(dc/t*100):0;
  const started=dc>0, finished=dc>=t&&t>0;
  card.innerHTML=`<div class="todaycard"><div class="tc-grad"></div><div class="tc-in">
    <div class="tc-eyebrow">${d.fc}</div>
    <div class="tc-title"><span class="grad">${d.ti}</span></div>
    <div class="tc-sub">${d.su}</div>
    <div class="tc-meta">
      <div class="tcm"><div class="v">${d.dur}'</div><div class="l">예상</div></div>
      <div class="tcm"><div class="v">${t}</div><div class="l">세트</div></div>
      <div class="tcm"><div class="v">${d.blk.length}</div><div class="l">블록</div></div>
    </div>
    <div class="tc-bar"><div class="f" style="width:${pct}%"></div></div>
    <div class="tc-cta"><span class="tc-prog-txt">${finished?'✓ 완료!':started?dc+'/'+t+' 세트':'아직 시작 안 함'}</span>
      <button class="start-btn" onclick="pickDay('${dkey}')">${finished?'다시 보기':started?'이어서 →':'시작하기 →'}</button></div>
  </div></div>`;
  // quick: 식단 / 진행
  document.getElementById('quickRow').innerHTML=`
    <div class="qbtn" onclick="goTab('diet')"><div class="qi">🍽️</div><div class="qt">오늘 식단</div></div>
    <div class="qbtn" onclick="goTab('prog')"><div class="qi">📊</div><div class="qt">체중 기록</div></div>
    <div class="qbtn" onclick="openMenu()"><div class="qi">📅</div><div class="qt">다른 날</div></div>`;
}

/* ---------- 세션 ---------- */
function showSession(){
  const d=M[cp][cd],wu=WU[d.wu],done=getDone(cp,cd);
  let h=`<div class="sess-back" onclick="backToToday()">← 오늘로</div>`;
  h+=`<div class="sess-head"><div class="sh-l"><div class="fc">${d.fc}</div><div class="ti">${d.ti}</div><div class="su">${d.su}</div></div><div class="sh-r"><div class="dur">${d.dur}'</div><div class="durl">예상</div></div></div>`;
  const t=totalSets(cp,cd),dc=done.length,pct=t?Math.round(dc/t*100):0;
  h+=`<div class="psum"><div class="psum-bar"><div class="psum-fill" style="width:${pct}%"></div></div><span class="psum-txt">${dc}/${t}</span><button class="reset-btn" onclick="resetDay()">리셋</button></div>`;
  h+=`<div class="wu"><div class="wu-h" onclick="toggleWU()"><span class="t">⚡ 워밍업 · 8분</span><span class="ic">+</span></div><div class="wu-b">
    ${wu.a.map(([n,v])=>`<div class="wu-r"><span class="n">${n}</span><span class="v">${v}</span></div>`).join('')}
    ${wu.b.map(([n,v])=>`<div class="wu-r"><span class="n">${n}</span><span class="v">${v}</span></div>`).join('')}</div></div>`;
  h+=`<div class="blocks">`;let exid=0;
  d.blk.forEach(b=>{
    h+=`<div class="blk"><div class="blk-h"><span class="chip ${b.cc}">${b.c}</span><span class="blk-d">${b.d}</span></div>`;
    b.e.forEach(ex=>{
      const [n,s,schemeRaw,cali,mus,rest,lvl,next]=ex;
      const scheme=applyCycle(schemeRaw);
      const myId=exid++,nSets=setCount(ex);
      let dcs=0;for(let i=0;i<nSets;i++)if(done.includes(myId+'-'+i))dcs++;
      const exDone=dcs>=nSets;
      let chips='';
      scheme.split('·').forEach((rep,i)=>{const sd=done.includes(myId+'-'+i);chips+=`<span class="set-chip${sd?' done':''}" onclick="event.stopPropagation();toggleSet(${myId},${i},${nSets},${rest})"><b>${rep}</b></span>`;});
      h+=`<div class="ex${exDone?' done':''}" data-ex="${myId}">
        <div class="check" onclick="toggleAll(${myId},${nSets})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="ex-l"><div class="ex-n">${n}<span class="lvl-tag">${lvl}</span><span class="muscle-tag">${mus}</span></div>
        <div class="ex-s">${s}<span class="next-prog" onclick="event.stopPropagation();showNext('${n.replace(/'/g,'')}','${next}')">↑ 다음 단계</span></div>
        <div class="set-chips">${chips}</div></div></div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;
  if(d.cardio===null)h+=`<div class="norest">🛑 하체날 유산소 없음 · 회복 우선</div>`;
  else h+=`<div class="cardio"><span class="em">🏃</span><div><div class="t">마무리 유산소</div><div class="s">${d.cardio}</div></div></div>`;
  if(dc>=t&&t>0)h+=`<div class="done-banner"><div class="t">🔥 세션 완료</div><div class="s">${DAY_KO[cd]} ${d.ti} 끝! 단백질 챙겨먹어</div></div>`;
  document.getElementById('sessView').innerHTML=h;
  showView('session');
}
function refreshSess(){
  const t=totalSets(cp,cd),dc=getDone(cp,cd).length,pct=t?Math.round(dc/t*100):0;
  const f=document.querySelector('#sessView .psum-fill');if(f)f.style.width=pct+'%';
  const x=document.querySelector('#sessView .psum-txt');if(x)x.textContent=`${dc}/${t}`;
}
function toggleWU(){document.querySelector('#sessView .wu').classList.toggle('open');}
function toggleSet(exId,setIdx,nSets,rest){
  let done=getDone(cp,cd);const tag=exId+'-'+setIdx,was=done.includes(tag);
  if(was)done=done.filter(x=>x!==tag);else done.push(tag);
  setDone(cp,cd,done);
  const exEl=document.querySelector(`#sessView .ex[data-ex="${exId}"]`);
  if(exEl){const chips=exEl.querySelectorAll('.set-chip');if(chips[setIdx])chips[setIdx].classList.toggle('done',!was);let dc=0;chips.forEach((c,i)=>{if(done.includes(exId+'-'+i))dc++;});exEl.classList.toggle('done',dc>=nSets);}
  refreshSess();
  if(!was&&rest>0)openTimer(rest);
  if(getDone(cp,cd).length>=totalSets(cp,cd)){toast('🔥 세션 완료!');fireConfetti();showSession();}
}
function toggleAll(exId,nSets){
  let done=getDone(cp,cd),dc=0;for(let i=0;i<nSets;i++)if(done.includes(exId+'-'+i))dc++;
  const fill=dc<nSets;
  for(let i=0;i<nSets;i++){const tag=exId+'-'+i;if(fill&&!done.includes(tag))done.push(tag);if(!fill)done=done.filter(x=>x!==tag);}
  setDone(cp,cd,done);showSession();
  if(fill&&getDone(cp,cd).length>=totalSets(cp,cd)){toast('🔥 세션 완료!');fireConfetti();}
}
function resetDay(){setDone(cp,cd,[]);showSession();}

/* ---------- 식단 ---------- */
function renderDiet(){
  let h=`<div class="sv-back" onclick="backToToday()">← 오늘로</div><div class="sv-title">NUTRITION</div><div class="sv-sub">급식 맞춤 컷 식단 · 단백질 160g</div>`;
  h+=`<div class="diet-macros">${DIET.macros.map(([v,u,l])=>`<div class="dm"><div class="v">${v}<span class="un">${u}</span></div><div class="l">${l}</div></div>`).join('')}</div>`;
  DIET.meals.forEach(([t,n,d,kcal,p])=>{h+=`<div class="meal"><div class="meal-t">${t}</div><div class="meal-n">${n}</div><div class="meal-d">${d}</div><div class="meal-mac"><span>칼로리 <b>${kcal}</b></span><span>단백질 <b>${p}g</b></span></div></div>`;});
  h+=`<div class="diet-note"><h4>식단 원칙</h4>${DIET.tips.map(([k,v])=>`<div class="r"><b>· ${k}</b> — ${v}</div>`).join('')}</div>`;
  document.getElementById('dietView').innerHTML=h;
}

/* ---------- 진행 ---------- */
function cycleProgress(ci){let done=0,total=0;const sc=cc;cc=ci;DOW_ORDER.forEach(k=>{for(let p=0;p<4;p++){total+=totalSets(p,k);done+=getDone(p,k).length;}});cc=sc;return{done,total,pct:total?Math.round(done/total*100):0};}
function weekDayProg(ci,p){const sc=cc;cc=ci;let d=0,t=0;DOW_ORDER.forEach(k=>{t+=totalSets(p,k);d+=getDone(p,k).length;});cc=sc;return t?d/t:0;}
function getWeights(){try{return JSON.parse(localStorage.getItem('asc_weights')||'[]')}catch(e){return[]}}
function logWeight(){
  const inp=document.getElementById('wIn');const v=parseFloat(inp.value);
  if(!v||v<40||v>200){toast('체중을 정확히 입력해줘');return;}
  let arr=getWeights();const today=new Date().toISOString().slice(0,10);
  arr=arr.filter(x=>x.d!==today);arr.push({d:today,w:v});arr.sort((a,b)=>a.d.localeCompare(b.d));
  try{localStorage.setItem('asc_weights',JSON.stringify(arr));}catch(e){}
  inp.value='';toast('✓ 체중 기록됨');renderProg();
}
function renderProg(){
  const weights=getWeights();
  const cur=weights.length?weights[weights.length-1].w:84;
  const start=weights.length?weights[0].w:84;
  const lost=(start-cur).toFixed(1);
  const done=Math.max(0,Math.min(1,(84-cur)/(84-70)));
  const pct=Math.round(done*100);const circ=2*Math.PI*40,off=circ*(1-done);
  let h=`<div class="sv-back" onclick="backToToday()">← 오늘로</div><div class="sv-title">PROGRESS</div><div class="sv-sub">체중 · 사이클 추적</div><div class="prog">`;
  h+=`<div class="prog-hero"><div class="prog-ringwrap">
    <div class="prog-ring"><svg width="100" height="100"><circle cx="50" cy="50" r="40" fill="none" stroke="var(--line)" stroke-width="8"/><circle cx="50" cy="50" r="40" fill="none" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" stroke-dasharray="${circ.toFixed(0)}" stroke-dashoffset="${off.toFixed(0)}"/></svg><div class="pct">${pct}%</div></div>
    <div><div class="prog-big">${cur}<span class="un">kg</span></div><div class="prog-lbl">시작 대비 ${lost>0?'-':''}${Math.abs(lost)}kg</div><div class="prog-lbl acc">목표 84 → 79(7월) → 70(1월)</div></div>
  </div></div>`;
  h+=`<div class="prog-input"><h4>오늘 체중 (아침 공복)</h4><div class="wlog"><input id="wIn" type="number" inputmode="decimal" placeholder="${cur}" step="0.1"><button onclick="logWeight()">기록</button></div>`;
  if(weights.length){h+=`<div class="wlog-list">`+weights.slice(-7).reverse().map(x=>`<div class="wlog-row"><span class="d">${x.d}</span><span class="w">${x.w}kg</span></div>`).join('')+`</div>`;}
  h+=`</div>`;
  h+=`<h4 class="sec">운동 진행률</h4><div class="cyc-grid">`;
  CYCLES.forEach((c,ci)=>{const cpr=cycleProgress(ci);let dots='';for(let p=0;p<4;p++){const wp=weekDayProg(ci,p);dots+=`<div class="wk-dot"><div class="f" style="transform:scaleX(${wp.toFixed(2)})"></div></div>`;}h+=`<div class="cyc-card"><div class="cyc-card-h"><div><div class="cyc-card-n">${c.name}</div><div class="cyc-card-s">${c.sub}</div></div><div class="cyc-card-pct">${cpr.pct}%</div></div><div class="wk-dots">${dots}</div></div>`;});
  h+=`</div></div>`;
  document.getElementById('progView').innerHTML=h;
}

/* ---------- 타이머 ---------- */
let tLeft=0,tTotal=0,tInt=null;const R=660;
function openTimer(sec){tLeft=sec;tTotal=sec;var cs=getComputedStyle(document.documentElement);var rf=document.getElementById('ringFill');if(rf)rf.setAttribute('stroke',cs.getPropertyValue('--accent').trim());document.getElementById('timerOv').classList.add('show');updTimer();clearInterval(tInt);tInt=setInterval(()=>{tLeft--;updTimer();if(tLeft<=0){clearInterval(tInt);try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch(e){}toast('💪 휴식 끝!');closeTimer();}},1000);}
function updTimer(){const m=Math.floor(tLeft/60),s=tLeft%60;document.getElementById('tovTime').textContent=`${m}:${String(s).padStart(2,'0')}`;document.getElementById('ringFill').style.strokeDashoffset=R*(1-tLeft/tTotal);}
function addTime(s){tLeft+=s;tTotal=Math.max(tTotal,tLeft);updTimer();}
function closeTimer(){clearInterval(tInt);document.getElementById('timerOv').classList.remove('show');}
function showNext(n,nx){toast(`↑ ${n} → ${nx}`);}
let toastT=null;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);}
function fireConfetti(){const cs=getComputedStyle(document.documentElement),ac=cs.getPropertyValue('--accent').trim()||'#c6f135';const cols=[ac,'#5e9bff','#3ddb8f','#ff8a4c','#c084fc','#ffb13d'];for(let i=0;i<32;i++){const c=document.createElement('div');c.className='confetti';c.style.background=cols[i%cols.length];c.style.left=(50+(Math.random()-.5)*30)+'%';c.style.top='38%';document.body.appendChild(c);const a=Math.random()*Math.PI*2,v=190+Math.random()*230,dx=Math.cos(a)*v,dy=Math.sin(a)*v-200;c.animate([{transform:'translate(0,0) rotate(0)',opacity:1},{transform:`translate(${dx}px,${dy+440}px) rotate(${Math.random()*720}deg)`,opacity:0}],{duration:1100+Math.random()*600,easing:'cubic-bezier(.2,.6,.4,1)'}).onfinish=()=>c.remove();}}

/* ---------- 테마 ---------- */
const THEMES=[
 ["hitagi","히타기 크랩","#0d0813","#b066ff","#e0568f","theme-hitagi.jpg?v=4"],
 ["mayoi","마요이 마이마이","#0a0c06","#f5c451","#9bd444","theme-mayoi.jpg?v=4"],
 ["suruga","스루가 몽키","#070a14","#5e8bff","#9d6cff","theme-suruga.jpg?v=4"],
 ["nadeko","나데코 스네이크","#0f0a07","#ff8a3d","#ff6f91","theme-nadeko.jpg?v=4"],
 ["tsubasa","츠바사 캣","#0f0708","#ff2d3f","#ff7a45","theme-tsubasa.jpg?v=4"],
 ["aurora","오로라","#070710","#c6f135","#22d3ee"],["sunset","선셋","#0e0608","#ff2d55","#ff9d2f"],["abyss","어비스","#040810","#00e5ff","#7c5cff"],["orchid","오키드","#0b0712","#c061ff","#ff61dc"],["jade","제이드","#04100b","#2bf58a","#a3e635"],["sakura","사쿠라","#0f0a0d","#ff7eb6","#c061ff"],["mono","모노","#0b0b0d","#ffffff","#9ca3af"],["daylight","데이라이트","#eef1f7","#3b5bff","#7c3cff"]];
function applyTheme(id){document.documentElement.setAttribute('data-theme',id);var charThemes=['hitagi','mayoi','suruga','nadeko','tsubasa'];document.body.classList.toggle('has-char',charThemes.indexOf(id)>=0);try{localStorage.setItem('asc_theme',id);}catch(e){}const cs=getComputedStyle(document.documentElement),bg=cs.getPropertyValue('--bg').trim();let mt=document.querySelector('meta[name=theme-color]');if(mt)mt.setAttribute('content',bg);renderThemeGrid();}
function renderThemeGrid(){const cur=document.documentElement.getAttribute('data-theme')||'midnight';document.getElementById('themeGrid').innerHTML=THEMES.map(([id,nm,bg,a1,a2])=>`<div class="theme-card${id===cur?' on':''}" style="--tc-accent:${a1}" onclick="applyTheme('${id}')"><div class="tc-swatch2" style="background:linear-gradient(135deg,${a1},${a2})"></div><div class="tc-name">${nm}</div><div class="tc-check"></div></div>`).join('');}
function openThemes(){renderThemeGrid();document.getElementById('drawerOv').classList.add('show');document.getElementById('drawer').classList.add('show');}
function closeThemes(){document.getElementById('drawerOv').classList.remove('show');document.getElementById('drawer').classList.remove('show');}
(function(){let t='hitagi';try{t=localStorage.getItem('asc_theme')||'hitagi';}catch(e){}document.documentElement.setAttribute('data-theme',t);var charThemes=['hitagi','mayoi','suruga','nadeko','tsubasa'];if(document.body)document.body.classList.toggle('has-char',charThemes.indexOf(t)>=0);else window.addEventListener('DOMContentLoaded',function(){document.body.classList.toggle('has-char',charThemes.indexOf(t)>=0);});})();

/* ---------- init ---------- */
cd=todayKey()==='sun'?'mon':todayKey();
renderToday();
